name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            # Build a universal binary so the DMG runs on both
            # Apple Silicon (aarch64) and Intel (x86_64) Macs.
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Both targets are required to build a universal macOS binary.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          node -e "
          const fs = require('fs');
          const v = '${VERSION}';
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = v;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          tauri.package.version = v;
          fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2) + '\n');
          const cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          fs.writeFileSync('src-tauri/Cargo.toml', cargo.replace(/^version = \"[^\"]*\"/m, 'version = \"' + v + '\"'));
          "

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MarkdownUI ${{ github.ref_name }}'
          releaseBody: |
            See the assets to download and install this version.

            **macOS note:** The app is not code-signed (no paid Apple Developer certificate). After installing, macOS Gatekeeper may report the app as "damaged" or from an "unidentified developer." Clear the quarantine flag to run it:

            ```
            xattr -cr /Applications/MarkdownUI.app
            ```
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
