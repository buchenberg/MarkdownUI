name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-24.04]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          # Tauri v1 needs libsoup2.4 which was dropped in Ubuntu 24.04 — build from source
          sudo apt-get install -y libglib2.0-dev libxml2-dev libsqlite3-dev libpsl-dev meson ninja-build
          curl -sSLO https://download.gnome.org/sources/libsoup/2.74/libsoup-2.74.3.tar.xz
          tar xf libsoup-2.74.3.tar.xz
          cd libsoup-2.74.3
          meson setup _build -Dvapi=disabled -Dgssapi=disabled -Dsysprof=disabled -Dtls_check=false -Dintrospection=disabled
          ninja -C _build
          sudo ninja -C _build install
          sudo ldconfig

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          node -e "
          const fs = require('fs');
          const v = '${VERSION}';
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = v;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          tauri.package.version = v;
          fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2) + '\n');
          const cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          fs.writeFileSync('src-tauri/Cargo.toml', cargo.replace(/^version = \"[^\"]*\"/m, 'version = \"' + v + '\"'));
          "

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MarkdownUI ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
